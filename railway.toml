[build]
builder = "NIXPACKS"

[deploy]
startCommand = "PYTHONPATH=. POLICY_FILE_PATH=./policy_terms.json uvicorn app.main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/health"
restartPolicyType = "ON_FAILURE"
startCommand = "cd plum-claims && PYTHONPATH=. POLICY_FILE_PATH=../policy_terms.json uvicorn app.main:app --host 0.0.0.0 --port $PORT"
